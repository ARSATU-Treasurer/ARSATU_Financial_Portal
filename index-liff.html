<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSATU LIFF - ลงทะเบียนใช้งาน</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; color: #334155; }
        .box { background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        img { border-radius: 50%; width: 90px; height: 90px; object-fit: cover; margin-bottom: 15px; border: 3px solid #00B900; }
        .btn { background: #00B900; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px;}
        .form-control { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: 'Prompt'; }
        label { display: block; text-align: left; font-size: 14px; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #00B900; margin-top: 0;">ARSATU Treasurer on LINE</h2>
        
        <div id="loading">กำลังเชื่อมต่อกับแอป LINE... ⏳</div>

        <div id="register-section" style="display: none;">
            <img id="line-pic" src="" alt="Profile">
            <h3 style="margin-top: 0;">ลงทะเบียนเข้าใช้งาน</h3>
            <p style="font-size: 13px; color: gray; margin-bottom: 20px;">กรุณากรอกข้อมูลเพื่อขอสิทธิ์จากแอดมิน</p>
            
            <form id="reg-form">
                <label>ชื่อเล่น</label>
                <input type="text" id="reg-name" class="form-control" placeholder="เช่น น้องเอ สวัสดิการ" required>
                
                <label>ฝ่าย</label>
                <select id="reg-dept" class="form-control" required>
                    <option value="" disabled selected>-- เลือกฝ่าย --</option>
                    <option value="อำนวยการ">อำนวยการ-ประธาน/รองประธาน/เลขานุการ</option>
                    <option value="สวัสดิการ">สวัสดิการ</option>
                    <option value="สถานที่">สถานที่</option>
                    <option value="อุปกรณ์">อุปกรณ์</option>
                    <option value="เหรัญญิก">เหรัญญิก</option>
                    <option value="โครงงาน">โครงงาน</option>
                    <option value="PR">PR</option>
                    <option value="สัมพันธ์ชาวบ้าน">สัมพันธ์ชาวบ้าน</option>
                    <option value="ส่วนกลาง">ส่วนกลาง / อื่นๆ</option>
                </select>
                
                <button type="submit" class="btn" id="reg-btn">📝 ยืนยันการลงทะเบียน</button>
            </form>
            <p id="reg-msg" style="color: red; font-size: 13px; margin-top: 10px;"></p>
        </div>

        <div id="pending-section" style="display: none; padding: 20px 0;">
            <div style="font-size: 50px; margin-bottom: 10px;">⏳</div>
            <h3 style="color: #d97706; margin: 0;">รอผู้ดูแลระบบอนุมัติ</h3>
            <p style="font-size: 14px; color: gray;">บัญชีของคุณลงทะเบียนเรียบร้อยแล้ว<br>กรุณารอแอดมินอนุมัติสิทธิ์การเข้าถึง</p>
        </div>
    </div>

    <script>
        const myLiffId = "2009420030-HR5GocKw"; 
        let lineProfile = null;
        let dummyEmail = "";
        let dummyPwd = "";

        async function initLiff() {
            try {
                await liff.init({ liffId: myLiffId });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                lineProfile = await liff.getProfile();
                // 💡 ทริค V.5.3: สร้างอีเมลจำลองจาก LINE ID เพื่อใช้ล็อกอิน
                dummyEmail = `${lineProfile.userId}@arsatu.line`;
                dummyPwd = `LineAuth#${lineProfile.userId}`;

                checkUserStatus();

            } catch (err) {
                document.getElementById('loading').textContent = "เกิดข้อผิดพลาด LIFF: " + err.message;
            }
        }

        async function checkUserStatus() {
            // ลองล็อกอินด้วยบัญชี LINE (ถ้าล็อกอินผ่านแปลว่าเคยสมัครแล้ว)
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: dummyEmail, password: dummyPwd });
            
            if (error) {
                // ถ้าล็อกอินไม่ผ่าน แปลว่าเป็น "คนใหม่" ให้โชว์ฟอร์มสมัคร
                document.getElementById('loading').style.display = 'none';
                document.getElementById('register-section').style.display = 'block';
                document.getElementById('line-pic').src = lineProfile.pictureUrl || 'https://via.placeholder.com/150';
                document.getElementById('reg-name').value = lineProfile.displayName;
            } else {
                // ถ้าล็อกอินผ่าน เช็กสถานะจากตาราง Profiles
                const { data: profile } = await supabaseClient.from('profiles').select('status, role').eq('id', data.user.id).single();
                
                document.getElementById('loading').style.display = 'none';
                if (profile && profile.status === 'pending') {
                    // ถ้ารออนุมัติ
                    document.getElementById('pending-section').style.display = 'block';
                    await supabaseClient.auth.signOut(); // เตะออกก่อนจนกว่าจะอนุมัติ
                } else {
                    // ถ้าอนุมัติแล้ว พาเข้าแอปเลย!
                    localStorage.setItem('loginSource', 'liff');
                    if (profile.role === 'admin') window.location.replace('dashboard.html');
                    else window.location.replace('member.html');
                }
            }
        }

        // กดปุ่มลงทะเบียน
        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            const msg = document.getElementById('reg-msg');
            const name = document.getElementById('reg-name').value;
            const dept = document.getElementById('reg-dept').value;

            btn.disabled = true; btn.textContent = "กำลังลงทะเบียน..."; msg.textContent = "";

            try {
                // 1. สร้างบัญชีผีให้ในระบบ
                const { data, error } = await supabaseClient.auth.signUp({ email: dummyEmail, password: dummyPwd });
                if (error) throw error;

                // 2. อัปเดตข้อมูลโปรไฟล์ให้เป็น รออนุมัติ (pending)
                // รอให้ Supabase สร้างโปรไฟล์อัตโนมัติเสร็จก่อน (ใช้ setTimeout นิดนึง)
                setTimeout(async () => {
                    await supabaseClient.from('profiles').update({ 
                        full_name: name, 
                        department: dept, 
                        line_user_id: lineProfile.userId,
                        status: 'pending',
                        role: 'member' // ค่าเริ่มต้น
                    }).eq('id', data.user.id);
                    
                    await supabaseClient.auth.signOut(); // ลงทะเบียนเสร็จ เตะออกมารอหน้า Pending
                    
                    document.getElementById('register-section').style.display = 'none';
                    document.getElementById('pending-section').style.display = 'block';
                }, 1000);

            } catch (err) {
                msg.textContent = "ผิดพลาด: " + err.message;
                btn.disabled = false; btn.textContent = "📝 ยืนยันการลงทะเบียน";
            }
        });

        initLiff();
    </script>
</body>
</html>
