<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSATU LIFF - เชื่อมต่อระบบ</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script> ```
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; }
        .profile-box { background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        img { border-radius: 50%; width: 100px; height: 100px; object-fit: cover; margin-bottom: 15px; border: 3px solid #00B900; }
        .btn { background: #00B900; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;}
        .form-control { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
    </style>
</head>
<body>
    <div class="profile-box">
        <h2 style="color: #00B900; margin-top: 0;">ARSATU x LINE</h2>
        <div id="loading">กำลังเชื่อมต่อกับแอป LINE... ⏳</div>
        
        <div id="profile-info" style="display: none;">
            <img id="pictureUrl" src="" alt="Profile">
            <h3 id="displayName" style="margin: 10px 0;"></h3>
            <p style="color: gray; font-size: 12px; margin-top: 0;" id="userId"></p>
            <p style="color: #d97706; font-size: 14px; background: #fef3c7; padding: 10px; border-radius: 8px;">พบข้อมูล LINE ของคุณแล้ว!</p>
            <button class="btn" id="show-login-btn">ผูกบัญชีค่าย (ARSATU)</button>
        </div>

        <div id="login-section" style="display: none; margin-top: 20px; text-align: left;">
            <p style="font-size: 14px; color: gray;">กรุณาล็อกอินด้วยบัญชี ARSATU เพื่อยืนยันตัวตน</p>
            <input type="email" id="email" class="form-control" placeholder="อีเมล (Email)">
            <input type="password" id="password" class="form-control" placeholder="รหัสผ่าน (Password)">
            <button class="btn" id="link-account-btn" style="background: var(--primary);">🔗 ยืนยันการผูกบัญชี</button>
            <p id="error-msg" style="color: red; font-size: 13px; text-align: center;"></p>
        </div>
    </div>

    <script>

        // 🔴 2. ใส่ LIFF ID
        const myLiffId = "2009420030-HR5GocKw";
        
        let currentLineId = "";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: myLiffId });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    currentLineId = profile.userId; // เก็บ LINE ID ไว้เตรียมผูก
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('profile-info').style.display = 'block';
                    document.getElementById('pictureUrl').src = profile.pictureUrl || 'https://via.placeholder.com/150';
                    document.getElementById('displayName').textContent = "สวัสดีคุณ " + profile.displayName;
                    document.getElementById('userId').textContent = "LINE ID: " + currentLineId;
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF Init Error:', err);
                document.getElementById('loading').textContent = "เกิดข้อผิดพลาด: " + err.message;
            }
        }

        initializeLiff();

        // เมื่อกดปุ่ม "ผูกบัญชี" ให้โชว์ช่องใส่รหัสผ่าน
        document.getElementById('show-login-btn').addEventListener('click', () => {
            document.getElementById('show-login-btn').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });

        // เมื่อกด "ยืนยันการผูกบัญชี"
        document.getElementById('link-account-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('error-msg');
            const btn = document.getElementById('link-account-btn');

            if (!email || !password) { msg.textContent = "กรุณากรอกอีเมลและรหัสผ่านครับ"; return; }
            
            btn.disabled = true;
            btn.textContent = "กำลังตรวจสอบ...";
            msg.textContent = "";

            try {
                // 1. ล็อกอินเข้า Supabase
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;

                // 2. ถ้าล็อกอินผ่าน เอา LINE ID ไปอัปเดตในตาราง profiles
                const { error: updateError } = await supabaseClient.from('profiles')
                    .update({ line_user_id: currentLineId })
                    .eq('id', data.user.id);
                
                if (updateError) {
                    if (updateError.code === '23505') throw new Error("LINE นี้ถูกผูกกับบัญชีอื่นไปแล้วครับ");
                    throw updateError;
                }

                // 3. ผเร็จแล้วเด้งไปหน้า member.html
                alert("🎉 ผูกบัญชีสำเร็จ! ยินดีต้อนรับเข้าสู่ระบบครับ");
                window.location.replace('member.html'); // เด้งเข้าแอป V.4.0 ที่มีอยู่แล้ว

            } catch (err) {
                msg.textContent = err.message === 'Invalid login credentials' ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : err.message;
                btn.disabled = false;
                btn.textContent = "🔗 ยืนยันการผูกบัญชี";
            }
        });
    </script>
</body>
</html>
