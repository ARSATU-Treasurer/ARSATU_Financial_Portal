<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Archive Reader - ARSATU</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #f1f5f9; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .upload-area { border: 2px dashed #3b82f6; padding: 40px; text-align: center; background: #eff6ff; cursor: pointer; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f8fafc; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: auto;">
        <div class="card" style="text-align: center;">
            <h1>📦 Archive Reader</h1>
            <p>อัปโหลดไฟล์ <b>.json</b> เพื่อเรียกดูข้อมูลย้อนหลัง (Offline Mode)</p>
            <label class="upload-area" style="display: block;">
                <h3>📥 คลิกเพื่อเลือกไฟล์ Archive</h3>
                <input type="file" id="file-input" accept=".json" style="display: none;">
            </label>
        </div>
        <div id="content" style="display: none;">
            <div class="card"><h2>📊 รายการเบิกจ่าย (Clearances)</h2><table id="req-table"><thead><tr><th>วันที่</th><th>ผู้เบิก</th><th>รายการ</th><th>ยอดเงิน</th><th>สถานะ</th></tr></thead><tbody></tbody></table></div>
            <div class="card"><h2>📖 รายการเงินเข้า-ออก (Transactions)</h2><table id="tx-table"><thead><tr><th>วันที่</th><th>รายละเอียด</th><th>ประเภท</th><th>ยอดเงิน</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>
    <script>
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = JSON.parse(event.target.result);
                renderData(data);
            };
            reader.readAsText(file);
        });
        function renderData(data) {
            document.getElementById('content').style.display = 'block';
            const profiles = {};
            data.data.profiles.forEach(p => profiles[p.id] = p.full_name);
            
            document.querySelector('#req-table tbody').innerHTML = data.data.clearances.map(r => `
                <tr><td>${new Date(r.created_at).toLocaleDateString()}</td><td>${profiles[r.member_id] || '-'}</td><td>${r.purpose}</td><td>฿${r.requested_amount.toLocaleString()}</td><td>${r.status}</td></tr>
            `).join('');
            
            document.querySelector('#tx-table tbody').innerHTML = data.data.transactions.map(t => `
                <tr><td>${new Date(t.created_at).toLocaleDateString()}</td><td>${t.description}</td><td>${t.transaction_type}</td><td>฿${t.amount.toLocaleString()}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
