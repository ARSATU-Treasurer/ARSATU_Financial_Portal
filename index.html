<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ARSATU Financial Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e44ad;
            --primary-hover: #7d3c98;
            --bg-linear: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-main: #2c3e50;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-linear);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-section h1 {
            margin: 0;
            color: var(--primary);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo-section p {
            margin: 5px 0 0;
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
            background-color: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 8px rgba(142, 68, 173, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.3);
        }

        .btn-login:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        /* สไตล์สำหรับปุ่ม LINE */
        .btn-line {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #06C755;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-line:hover {
            background-color: #05a044;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(6, 199, 85, 0.3);
        }

        #login-msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }

        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        
        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <h1>ARSATU</h1>
            <p>Financial Management Portal</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">อีเมล (Email)</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="login-btn">เข้าสู่ระบบ</button>
        </form>

        <button type="button" class="btn-line" onclick="window.location.href='index-liff.html'">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.303.079.778.039 1.085l-.171 1.027c-.053.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.572-3.843 2.572-5.992zm-15.608 2.943h-2.527c-.218 0-.396-.178-.396-.396V8.694c0-.218.178-.396.396-.396h.983c.218 0 .396.178.396.396v3.355h1.148c.218 0 .396.178.396.396v.402c0 .218-.178.396-.396.396zm1.909 0h-.983c-.218 0-.396-.178-.396-.396V8.694c0-.218.178-.396.396-.396h.983c.218 0 .396.178.396.396v4.157c0 .218-.178.396-.396.396zm5.827 0h-.983c-.111 0-.214-.047-.285-.128l-2.006-2.316v2.048c0 .218-.178.396-.396.396h-.983c-.218 0-.396-.178-.396-.396V8.694c0-.218.178-.396.396-.396h.983c.111 0 .214.047.285.128l2.006 2.316V8.694c0-.218.178-.396.396-.396h.983c.218 0 .396.178.396.396v4.157c0 .218-.178.396-.396.396zm3.178-2.616h-1.527v.757h1.527c.218 0 .396.178.396.396v.402c0 .218-.178.396-.396.396h-2.51c-.218 0-.396-.178-.396-.396V8.694c0-.218.178-.396.396-.396h2.51c.218 0 .396.178.396.396v.402c0 .218-.178.396-.396.396h-1.527v.726h1.527c.218 0 .396.178.396.396v.402c0 .218-.178.396-.396.396z"/>
            </svg>
            เข้าสู่ระบบด้วย LINE
        </button>

        <div style="margin-top: 25px; padding-top: 20px; border-top: 1px dashed #cbd5e1; text-align: center;">
            <p style="font-size: 13px; color: #64748b; margin-bottom: 10px;">สำหรับบุคคลทั่วไป / ผู้บริจาค / ศิษย์เก่า</p>
            <button type="button" onclick="window.location.href='transparency.html'" style="width: 100%; padding: 10px; background: white; border: 1px solid #3b82f6; color: #3b82f6; border-radius: 6px; font-family: 'Prompt'; font-weight: 500; cursor: pointer; font-size: 14px; transition: 0.2s;">
                🏛️ ดูรายงานความโปร่งใสทางการเงิน (Public)
            </button>
        </div>

        <div id="login-msg"></div>

        <div class="footer-text">
            &copy; 2026 ARSATU Treasurer
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('login-msg');
            const btn = document.getElementById('login-btn');

            msg.className = '';
            msg.textContent = 'กำลังตรวจสอบข้อมูล...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                msg.className = 'success';
                msg.textContent = 'เข้าสู่ระบบสำเร็จ! กำลังเปลี่ยนหน้า...';

                // ตรวจสอบ Role ของผู้ใช้เพื่อ Redirect
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                setTimeout(() => {
                    if (profile.role === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'member.html';
                    }
                }, 1000);

            } catch (err) {
                msg.className = 'error';
                msg.textContent = 'ล็อกอินไม่สำเร็จ: ' + err.message;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
