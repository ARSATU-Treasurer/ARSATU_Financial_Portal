<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ARSATU Financial Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e44ad;
            --primary-hover: #7d3c98;
            --bg-linear: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-main: #2c3e50;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-linear);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-section h1 {
            margin: 0;
            color: var(--primary);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo-section p {
            margin: 5px 0 0;
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
            background-color: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 8px rgba(142, 68, 173, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(142, 68, 173, 0.3);
        }

        .btn-login:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        #login-msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
        }

        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        
        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-section">
            <h1>ARSATU</h1>
            <p>Financial Management Portal</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">อีเมล (Email)</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="login-btn">เข้าสู่ระบบ</button>
        </form>

        <div id="login-msg"></div>

        <div class="footer-text">
            &copy; 2026 ARSATU Treasurer
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('login-msg');
            const btn = document.getElementById('login-btn');

            msg.className = '';
            msg.textContent = 'กำลังตรวจสอบข้อมูล...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                msg.className = 'success';
                msg.textContent = 'เข้าสู่ระบบสำเร็จ! กำลังเปลี่ยนหน้า...';

                // ตรวจสอบ Role ของผู้ใช้เพื่อ Redirect
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                setTimeout(() => {
                    if (profile.role === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'member.html';
                    }
                }, 1000);

            } catch (err) {
                msg.className = 'error';
                msg.textContent = 'ล็อกอินไม่สำเร็จ: ' + err.message;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
