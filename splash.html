<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบการเงินของอาสตูญ่ายไม่ได้ - ARSATU NEXT</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .splash-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .header-text {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-text h1 {
            font-size: 32px;
            color: #2c3e50;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .logo-section {
            margin-bottom: 50px;
            animation: zoomIn 1s ease-out;
        }

        .logo {
            width: 300px;
            height: auto;
            object-fit: contain;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeIn 1.2s ease-out;
        }

        .welcome-section h2 {
            font-size: 42px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .welcome-section h2:hover {
            color: #8e44ad;
            transform: scale(1.05);
        }

        .website-url {
            font-size: 16px;
            color: #7f8c8d;
            letter-spacing: 0.5px;
        }

        .character-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            max-width: 900px;
            position: relative;
            animation: fadeInUp 1s ease-out;
        }

        .character {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .monkey-left {
            animation: bounce 3s infinite;
        }

        .monkey-svg {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        .click-button {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-text {
            width: 180px;
            height: 180px;
            border: 4px solid #2c3e50;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .circle-text:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(142, 68, 173, 0.3);
            border-color: #8e44ad;
        }

        .circle-text:active {
            transform: scale(0.95);
        }

        .thai-text {
            font-size: 48px;
            font-weight: 600;
            color: #2c3e50;
            line-height: 1;
        }

        .thai-subtext {
            font-size: 20px;
            color: #8e44ad;
            font-weight: 600;
            margin-top: 8px;
        }

        .question-right {
            animation: bounce 3s infinite 0.5s;
        }

        .question-svg {
            width: 180px;
            height: 180px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-text h1 {
                font-size: 24px;
            }

            .logo {
                width: 200px;
            }

            .welcome-section h2 {
                font-size: 32px;
            }

            .character-section {
                flex-wrap: wrap;
                gap: 30px;
            }

            .monkey-svg,
            .question-svg {
                width: 120px;
                height: 120px;
            }

            .circle-text {
                width: 150px;
                height: 150px;
            }

            .thai-text {
                font-size: 36px;
            }

            .thai-subtext {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .splash-container {
                height: auto;
                min-height: 100vh;
                padding: 20px;
            }

            .header-text {
                margin-bottom: 40px;
            }

            .header-text h1 {
                font-size: 20px;
            }

            .logo {
                width: 150px;
            }

            .welcome-section {
                margin-bottom: 50px;
            }

            .welcome-section h2 {
                font-size: 24px;
            }

            .website-url {
                font-size: 14px;
            }

            .character-section {
                flex-direction: column;
                gap: 20px;
            }

            .monkey-svg,
            .question-svg {
                width: 100px;
                height: 100px;
            }

            .circle-text {
                width: 120px;
                height: 120px;
            }

            .thai-text {
                font-size: 28px;
            }

            .thai-subtext {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <!-- Header Text -->
        <div class="header-text">
            <h1>ระบบการเงินของอาสตูญ่ายไม่ได้</h1>
        </div>

        <!-- Logo Section -->
        <div class="logo-section">
            <img src="assets/arsatu-next-logo.png" alt="ARSATU NEXT Logo" class="logo">
        </div>

        <!-- Welcome Text -->
        <div class="welcome-section">
            <h2 onclick="handleClick()">คลิกที่นี่</h2>
            <p class="website-url">หรือ https://arsatu-next.netlify.app/</p>
        </div>

        <!-- Character Section -->
        <div class="character-section">
            <!-- Monkey Character -->
            <div class="character monkey-left">
                <svg viewBox="0 0 200 200" class="monkey-svg">
                    <!-- Head -->
                    <circle cx="100" cy="80" r="50" fill="#8B6F47"/>
                    
                    <!-- Ears -->
                    <circle cx="60" cy="45" r="20" fill="#8B6F47"/>
                    <circle cx="140" cy="45" r="20" fill="#8B6F47"/>
                    <circle cx="60" cy="45" r="12" fill="#D4A574"/>
                    <circle cx="140" cy="45" r="12" fill="#D4A574"/>
                    
                    <!-- Face -->
                    <circle cx="100" cy="90" r="38" fill="#D4A574"/>
                    
                    <!-- Eyes -->
                    <circle cx="85" cy="75" r="6" fill="#000"/>
                    <circle cx="115" cy="75" r="6" fill="#000"/>
                    <circle cx="87" cy="73" r="2.5" fill="#FFF"/>
                    <circle cx="117" cy="73" r="2.5" fill="#FFF"/>
                    
                    <!-- Smile -->
                    <path d="M 95 95 Q 100 100 105 95" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
                    
                    <!-- Nose -->
                    <ellipse cx="100" cy="85" rx="4" ry="5" fill="#000"/>
                </svg>
            </div>

            <!-- Click Button -->
            <div class="click-button">
                <div class="circle-text" onclick="handleClick()">
                    <span class="thai-text">เหย่</span>
                    <span class="thai-subtext">อาสาต์</span>
                </div>
            </div>

            <!-- Question Mark Character -->
            <div class="character question-right">
                <svg viewBox="0 0 200 200" class="question-svg">
                    <!-- Circle outline -->
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#2c3e50" stroke-width="4"/>
                    
                    <!-- Question mark with gradient effect -->
                    <text x="100" y="135" font-size="100" font-weight="bold" text-anchor="middle" fill="#2c3e50" font-family="'Prompt', sans-serif">?</text>
                </svg>
            </div>
        </div>
    </div>

    <script>
        function handleClick() {
            // Redirect to the login page
            window.location.href = 'index.html';
        }

        // Add keyboard support
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Enter' || event.code === 'Space') {
                handleClick();
            }
        });

        // Add touch support for mobile
        document.querySelector('.circle-text').addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.95)';
        });

        document.querySelector('.circle-text').addEventListener('touchend', function() {
            setTimeout(handleClick, 100);
        });
    </script>
</body>
</html>
